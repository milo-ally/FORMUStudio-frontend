spring:
  application:
    name: formu-studio-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/formu_studio
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your-super-secret-key-at-least-256-bits-long-change-in-production
  expiration: 86400000

logging:
  level:
    com.formu: DEBUG
    org.springframework.security: DEBUG
